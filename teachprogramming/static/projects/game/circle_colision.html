<!DOCTYPE html><html>
<head>
    <meta charset="utf-8" />

<body>
<canvas id="canvas_element" width="640" height="360" style="image-rendering: pixelated; object-fit: contain; width:100%; max-width: 100%; height: 100%; max-height: 100%;"></canvas>
</body>
<script type="module">

const canvas = document.getElementById('canvas_element')
const c = canvas.getContext('2d', { alpha: false })

class Line {
    constructor(x1,y1,x2,y2) {
        this.x1 = x1
        this.y1 = y1
        this.x2 = x2
        this.y2 = y2
        //this._update()
    }
    //_update() {
    //    this.dx = this.x1 - this.x2
    //    this.dy = this.y1 - this.y2
    //    this.dx_dy = this.dx / this.dy
    //    this.dy_dx = this.dy / this.dx
    //    this.a_b_c = [this.y1-this.y2, this.x2-this.x1, this.x1*this.y2 - this.x2*this.y1]
    //}
    get vector() {return [this.y1-this.y2, this.x2-this.x1, this.x1*this.y2 - this.x2*this.y1]}
    get to_array() {return [this.x1, this.y1, this.x2, this.y2]}
    translate = (x,y) => {return new Line(this.x1-x, this.y1-y, this.x2-x, this.y2-y)}
}

class Circle {
    constructor(x,y,r) {
        this.x = x
        this.y = y
        this.r = r
    }
    isOverlap = (other) => {
        const euclidean_overlap_radius = Math.pow(this.r + other.r, 2)
        const euclidean_distance = Math.pow(Math.abs(this.x-other.x),2) + Math.pow(Math.abs(this.y-other.y),2)
        return euclidean_distance < euclidean_overlap_radius
    }
    intersect = (line) => {
        // https://cp-algorithms.com/geometry/circle-line-intersection.html
        const [a, b, c] = line.translate(this.x, this.y).vector
        const c_c = c*c
        const r_r = this.r*this.r
        const a_a_b_b = a*a + b*b
        const r_r_a_a_b_b = r_r * a_a_b_b
        if (c_c > r_r_a_a_b_b + Number.EPSILON) {return}  // No intersect points
        const [x0, y0] = [-a*c/a_a_b_b+this.x, -b*c/a_a_b_b+this.y]
        if (Math.abs(c_c - r_r_a_a_b_b) < Number.EPSILON) {return} // console.log("1 point", x0, y0)
        const d = r_r - c_c/a_a_b_b
        const m = Math.sqrt(d/a_a_b_b)
        const [am, bm] = [a*m, b*m]
        return [x0+bm, y0-am, x0-bm, y0+am]
    }
}

function drawLine(c, x1,y1,x2,y2,lineWidth=1) {
    c.lineWidth = lineWidth
    c.beginPath()
    c.moveTo(Math.floor(x1)+0.5, Math.floor(y1)+0.5)
    c.lineTo(Math.floor(x2)+0.5, Math.floor(y2)+0.5)
    c.stroke()
}


function renderCircle(c, circle) {
    c.beginPath()
    c.arc(circle.x,circle.y,circle.r,0,Math.PI*2)
    c.fill()
}


const c1 = new Circle(50,50,20)

function click(e) {
    const r = e.target.getBoundingClientRect()
    const x = Math.floor((e.clientX - r.left) / (canvas.clientWidth/canvas.width))
    const y = Math.floor((e.clientY - r.top ) / (canvas.clientHeight/canvas.height))

    const c2 = new Circle(x,y,5)
    c.fillStyle = c1.isOverlap(c2)?'red':'white'
    renderCircle(c, c2)

    const l = new Line(0,0,c2.x,c2.y)

    c.strokeStyle = 'green'
    drawLine(c, ...l.to_array)

    const c3 = new Circle(c1.x, c1.y, c1.r+c2.r)
    let ii = c3.intersect(l)
    if (ii) {
        c.strokeStyle = 'red'
        drawLine(c, ...ii)
        console.log('yee', ii)
    }

}
canvas.addEventListener('mousedown', click, true)

c.fillStyle = 'white'
renderCircle(c, c1)
</script>
</html>
